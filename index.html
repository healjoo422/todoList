<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Board</title>

    <!-- Bootstrap5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts IBM Plex Sans KR 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <div class="orb orb-a" aria-hidden="true"></div>
        <div class="orb orb-b" aria-hidden="true"></div>

        <!-- 상단 헤더 -->
        <header class="top-header">
            <div class="container-xxl pt-4 pt-lg-5 pb-3">
                <div class="hero card border-0 shadow-lg">
                    <div class="card-body p-4 p-lg-5 d-flex flex-column flex-lg-row justify-content-between gap-4 align-items-lg-end">
                        <div>
                            <p class="eyebrow mb-2">KH 정보교육원 과제 / Bootstrap 5</p>
                            <h1 class="display-6 fw-bold mb-3">할 일 관리 + 온라인게임 컨텐츠 체크</h1>
                            <p class="lead mb-0 text-body-secondary">TODO 목록 터치로 완료상태 토글<br></p>
                        </div>
                        <div class="hero-pills d-flex flex-wrap gap-2 justify-content-start justify-content-lg-end align-items-center">
                            <span class="status-pill">오늘 <strong id="todayLabel">-</strong></span>
                            <span class="status-pill">일일 초기화 <strong>매일 00:00</strong></span>
                            <span class="status-pill">주간 초기화 <strong>매주 화요일 17:00</strong></span>
                            <button id="themeToggle" type="button" class="btn btn-theme-toggle rounded-pill">라이트 모드</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- 일반TODO 목록 -->
        <div class="container-xxl pb-4 pb-lg-5 position-relative app-content">
            <main class="row g-4">
                <section class="col-12 col-xl-4">
                    <div class="section-card card h-100 border-0 shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                                <div>
                                    <p class="section-kicker mb-1">TODO 리스트</p>
                                    <h2 class="h4 mb-1">개인 숙제!!!</h2>
                                    <p class="text-body-secondary mb-0">스마트하게 일일 과업을 관리하세요</p>
                                </div>
                                <span class="badge text-bg-dark" id="generalSummary">0개</span>
                            </div>

                            <div id="generalTaskList" class="task-stack" aria-label="일반 할 일 목록"></div>
                        </div>
                    </div>
                </section>

                <section class="col-12 col-xl-8 d-grid gap-4">
                    <div class="section-card card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                                <div>
                                    <p class="section-kicker mb-1">FF14 DAILY TODO</p>
                                    <h2 class="h4 mb-1">일일 컨텐츠</h2>
                                    <p class="text-body-secondary mb-0">귀찮지만 자주 까먹는것들</p>
                                </div>
                                <span class="badge rounded-pill text-bg-info-subtle text-info-emphasis">매일 00:00 초기화</span>
                            </div>

                            <div id="dailyTaskList" class="task-grid" aria-label="일일 컨텐츠 목록"></div>
                        </div>
                    </div>

                    <div class="section-card card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
                                <div>
                                    <p class="section-kicker mb-1">FF14 WEEKLY TODO</p>
                                    <h2 class="h4 mb-1">주간 컨텐츠</h2>
                                    <p class="text-body-secondary mb-0">4층 깨라</p>
                                </div>
                                <span class="badge rounded-pill text-bg-warning-subtle text-warning-emphasis">매주 화요일 17:00 초기화</span>
                            </div>

                            <div id="weeklyTaskList" class="task-grid" aria-label="주간 컨텐츠 목록"></div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div class="modal fade" id="generalTaskModal" tabindex="-1" aria-labelledby="generalTaskModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-surface border-0">
                <div class="modal-header border-0 pb-0">
                    <div>
                        <p class="section-kicker mb-1">일일 과업 추가</p>
                        <h2 class="modal-title h5 mb-0" id="generalTaskModalLabel">무엇을 할까요?</h2>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="닫기"></button>
                </div>
                <div class="modal-body">
                    <form id="generalTaskForm" class="vstack gap-3">
                        <div>
                            <label for="generalTaskTitle" class="form-label">todo</label>
                            <input id="generalTaskTitle" class="form-control form-control-lg" type="text" placeholder="예: 영어 단어 30개 암기" maxlength="80" required>
                        </div>
                        <div>
                            <label for="generalTaskSubtitle" class="form-label">설명</label>
                            <input id="generalTaskSubtitle" class="form-control form-control-lg" type="text" placeholder="대충 할 일 설명" maxlength="120">
                        </div>
                        <p id="generalTaskError" class="small text-danger mb-0 d-none" role="alert" aria-live="polite"></p>
                        <!-- <p class="text-body-secondary small mb-0">“서두르지도 말고, 쉬지도 말라!”  벤자민 프랭클린</p> -->
                    </form>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">취소</button>
                    <button type="submit" form="generalTaskForm" class="btn btn-primary btn-accent">추가</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
